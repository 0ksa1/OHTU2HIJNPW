name: CI

on:
  pull_request:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  sanity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Godot (headless)
        uses: chickensoft-games/setup-godot@v2
        with:
          version: "4.5.0"
          use-dotnet: false
          include-templates: false

      # GUT testing
      - name: Run unit tests (GUT)
        run: |
          godot --headless --path echoes-of-the-keep -s res://addons/gut/gut_cmdln.gd -gexit